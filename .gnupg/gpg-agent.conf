# Use Touch ID for GPG passphrase (falls back to pinentry-mac GUI)
# Install: brew tap jorgelbg/tap && brew install pinentry-touchid
pinentry-program /usr/local/opt/pinentry-touchid/bin/pinentry-touchid

# Cache passphrase for 8 hours (28800 seconds)
default-cache-ttl 28800
max-cache-ttl 28800

# SSH agent support
enable-ssh-support
default-cache-ttl-ssh 10800
max-cache-ttl-ssh 10800
